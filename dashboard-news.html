            "text": "If there’s one thing Melbourne simply cannot get enough of, it’s new bakeries. Here are four more to add to your ever-growing hit list. Bloomwood, CBD When Bloomwood burst onto Melbourne’s cafe scene in 2024, it quickly became a destination for its Asian-influenced viennoiserie. So far, the team has dreamt up inventions like Korean corn cheese danishes, pandan pain suisse and a limited-edition pastry that echoes Chinese tangyuan (sweet rice balls) with mochi, black-sesame custard and ginger-and-sesame cream – all served alongside a menu of specialty matcha and coffee drinks. Last month, the team opened a second location at Bourke Street’s Galleria. Head baker Max Loh, who previously led the kitchen at Bakemono and did a stint as senior chef de partie at the acclaimed Logan Brown in Wellington, New Zealand, pushes the menu towards “items that are more easily paired with daily coffees”, founder Brian Taing told Broadsheet. Find buttery shio pan in special flavours such as ube, salted egg yolk, garlic cream cheese, mentaiko (cod roe) and Hokkaido milk. Plus, croissants, scrolls, toasties and bagels. Cobb Lane, CBD When former Vue de Monde chef Matt Forbes opened the first Cobb Lane in Yarraville in 2013, he said a CBD location felt out of reach. But Cobb Lane quietly gained a following for its 36-hour-fermented sourdough and, by 2022, the petite inner-west cafe (originally on Anderson Street, now on Taylor Street) had expanded into markets in Richmond and South Melbourne. It now provides doughnuts, cookies, viennoiserie and other bakes to more than 200 cafes around Melbourne. In April, Forbes and his business and life partner Amy Newman opened a bakery on Bennetts Lane, just behind Caretaker’s Cottage. Raw products are prepared at the Yarraville bakery, transported, then baked in one of the deck ovens on-site, so the smell of freshly baked bread perpetually wafts through the air. And you’ll find Cobb Lane’s pork-and-fennel sausage rolls and cheesy vego pies as well as a hot version of English pork pie. Bread K, CBD When Korean bakery Bread K opened in Moonee Ponds in 2024, sogeum-ppang (Korean salt bread) was popular, but nowhere near as prevalent in Melbourne as it is now. The small bakery quickly gained a following for its large variety of sogeum-ppang and other Korean baked goods, including soboro buns and chewy “dinosaur egg” bread, which is made with glutinous rice flour, matcha and black sesame. In March, Bread K opened a city store, bringing its Korean bakes to Sutherland Street. Everything is made at the Moonee Ponds location, but there are some CBD-exclusive items such as soboro buns filled with basil cream cheese, and cream buns stuffed with red bean paste and fresh cream. The casual spot is self-serve, so pick up a tray and load it up. Bake Stand, CBD Every so often, someone opens up shop in hopes of becoming the new “it” cookie. But unlike American chains Levain, Milk Bar and Crumble, the latest contender is a Melbourne-born brand, Bake Stand. After opening the first Bake Stand at Melbourne Central last month, founders Vi Thao Tran and pastry chef Steven He (Le Yeahllow) have already expanded with a second location inside Melbourne Walk – officially opening on Thursday May 28 – and plan to open a third Bake Stand at Hyde Melbourne Place before the year’s end. Bake Stand specialises in “Melbourne-style cookies”, which Tran and He say are defined by crisp edges, a chewy centre and their large size (10-centimetre diameter). Flavours include hojicha and milk chocolate; dark chocolate and sea salt; and matcha, strawberry and white chocolate. Each is made with Valrhona chocolate and cultured butter from Sydney-based Pepe Saya. Additional reporting by Haymun Win",

            "title": "A Local Pour for Every Mood: Where To Drink Victorian Spirits Right Now",
            "text": "There’s no single way to drink local. Some nights call for something sharp and citrus-led, while others suit a Martini with a little olive brine, or a rich whisky Manhattan. That’s the thinking behind Serves of the State, a three-week celebration pairing 45 Victorian distilleries with 15 venues across Melbourne and Victoria, each creating bespoke cocktails that reflect the breadth of the state’s spirits scene. From May 25 to June 14, those venues will each pour three uniquely Victorian cocktails – spanning everything from coastal gin and native botanicals to coffee liqueurs, agave spirits and single malt whisky. As you try them, you can scan a QR code in-venue to vote for your favourite, helping crown Victoria’s Serve of the State. You’ll also go into the draw to win a VIP countryside distillery tour, curated and hosted by Vic Distilled ambassador Tayla Kendall. Whether you lean bright and floral, rich and spirit-forward, or somewhere closer to dessert, there’s a Victorian cocktail with your name on it. Bright and citrusy If sharp, citrus-led drinks are your thing, Hazel is a strong place to start. The Passionfruit and Lemon Myrtle Gimlet keeps the structure of the classic but brightens it with passionfruit and native lemon myrtle syrup. At Springrock, Blushing Duck pairs Angry Duck gin with Lillet Rosé, lemon and grapefruit rosella, while Bush Point balances blanco spirit with lime, verjus and bush salt. Backspace’s Callipo Sour goes all in on Amore Limoncello, yuzu and lemon, while Go FIGure leans aperitivo-style with burnt fig gin and Fernet Branca. At Death & Co, East 87 Hold Up runs tropical with passionfruit and pineapple with Fellow Vanilla and Cream vodka, while Chambray bringsBass & Flinders Noble Stranger Australian brandy, cinnamon and muddled strawberry. Whisky and Alement’s Apple Cart Elixir mixes Melbourne Moonshine Apple Pie Shine with lemon and grapefruit soda, while Mr Mills serves Army & Navy with Patient Wolf Pink Lake gin, grapefruit cordial and alpine strawberry. At The Pinnacle, The Pinny Spritz keeps things easy with aperitivo, prosecco and white chocolate-washed whisky. Jackalope’s Doot Doot Doot pours the Antipodes Gin Highball with apricot and soda, plus Chief’s Son Highball with pineapple and passionfruit. At Moondrop, The Third Date layers Tano Spirits Jagari shochu black koji, yuzushu and hot honey, while Grainery Lane’s Elderfashioned lands between citrus aperitif and Martini with the use of their house Elderflower and London Dry gins. Fruity and refreshing Some drinks are less about structure and more about mood. At Union Electric, Brooklyn In The Summer does exactly what the name promises: think Here's Looking At You Kid Yam Daisy gin, coconut and lemongrass syrup, lemon and aloe vera juice. At Black Kite Commune, Instupituous leans juicy, layering Penni Ave 16th Beach vodka, advocaat, lemon juice and Illawarra plum with lemonade. Bar Selecta keeps things playful with Luna City Pop Highball using Puss & Mew Navy Strength gin, Dragon Hime Gimlet using Herbit Blue Dragon gin and Ichigo Shiso Bramble using Envy Navy gin – all floral, fruit-forward and bright. Dom's Social Club’s Echuca Distillery Diablo blends Echuca Distillery Gold Agave Spirit, cassis and raspberry tea syrup, and the Quiet Corner Distillery Billionaire uses Quiet Corner Distillery Absinthe and bourbon, along with lemon juice, housemade grenadine and absinthe. Reed House’s Purple Dragon combines Little Lon Miss Yoko Lychee gin with dragonfruit and mint, while The Pinnacle’s Wombat Shakerato adds rye, cider and yuzu. Meanwhile, at Hazel, the Box Cutter Spritz mixes Jimmy Rum Navy with pink lady apple, grape and elderflower, while Strawberry Valentino brings together Bellicose pink gin and strawberry oleo. Savoury and Martini territory If your default order starts with “dirty”, this is your section. At Doot Doot Doot, the Mornington Distillery Martini keeps things savoury. Send For Kelp gin is stirred with white flower vermouth and purple basil brine, then finished with basil oil. At Mr Mills, the Pine & Vetiver Martini moves in a greener direction, layering Holcombe’s Spirit Sisters gin with vetiver, alpine bitters and dry vermouth. The Pinnacle offers a sharper take with The Pinny Martini, where MGC - Melbourne Gin Co. Single Shot gin, dry vermouth, fino and dry orange pull the drink towards something cleaner and more citrus-led. Whisky and Alement’s Sesame Sippin’ brings Backwoods Single Malt whisky, mirin and honey, while Black Kite Commune’s Interspectacular finishes with Macedon Distillery Mastiha and mascarpone cream. Rich and spirit-forward For slower drinking, Whisky and Alement and Reed House are strong starts. Apple of My Rye mixes Kinglake breakfast rye cask with Suze and honey-apple cordial, while Blackthorn Royale brings Recollection Spirits sour cherry nalyvka and whisky together. Back at Union Electric, The Priest & The Beast pulls together Black Sheep Hooch, Benedictine, pear and brown sugar syrup for something rounded and softly spiced. Elsewhere, Moondrop's None Of Your Beeswax adds Shaw's Red Wheat vodka with yuzushu, fino sherry and beezwax. And Backspace’s All-Father finishes somewhere between an Old Fashioned and a dessert pour, combining In Good Spirits Butterscotch Whisky, corn whisky, dry vermouth and amaretto. Sweet and dessert-like Some drinks are best ordered instead of dessert. At Dom's Social Club, that means the Seven Spice Chai Espresso Martini, where Hillmartin Distillery Seven Spice Chai gin joins coffee liqueur, cold brew espresso and vanilla sugar syrup, finished with salted cinnamon sugar. Grainery Lane’s Laneway Confidential riffs on Irish coffee with their own rum, while The Blind Tiger leans creamy with crème de cacao with their own gin. At Black Kite Commune, Fantabulous brings Daylesford Spirit Blueberry gin, watermelon and tropical fruit into the mix. Waggle Dance by Union Electric mixes Mates Gin Distillery's Sweet Surrender gin with yellow chartreuse and honey syrup. Whisky and Alement’s Midnight Mocha mixes Infusa Cappuccino, rye and chocolate bitters. At Moondrop, The Last Slice folds Johnnie Walker Black Label, cacao husk pastis, banana and milk punch into dessert form. The Coffee and Fig highball from Mr Mills spotlights That Spirited Lot Coffee vodka with a touch of sherry and fig aperitif. Apollo Bay Distillery gin is the main character in Springrock's Golden Wattle featuring orange, honey and vanilla. And Death & Co’s Beach Goth finishes with Starward Two Fold, banana liqueur and crème de cacao. This article is produced by Broadsheet in partnership with Vic Distilled. Check out all the participating bars and what they’re offering at Serves of the State at vicdistilled.com.au.",

            "text": "There are few better ways to kick off a night out than an aperitivo hour. You can’t go wrong with a snack plate paired with an excellent drink – especially at a Surry Hills staple. We’ve teamed up with Red Rock Deli to throw a weekend-long aperitivo hour at neighbourhood favourite The White Horse. We’re taking the decision paralysis out of food and drink matching by offering paired snacks and cocktails. From May 21 to May 24, the neighbourhood spot is serving dishes from the mind of executive chef Jun Hwang, all of which creatively incorporate the Deli Style Crackers by Red Rock Deli. Four food and drink pairings will be available from 3pm to 5pm on Thursday, and 12pm to 5pm from Friday to Sunday. Korean-style fried chicken will get the Sweet Chilli & Sour Cream cracker treatment. Chicken is cracker-crusted and fried until crisp, dressed in a sweet chilli sauce, then finished with cracker crumb and spring onions, and served with more crackers on the side. This is served alongside a Margarita with lemongrass-infused tequila, juiced cucumber, habanero-infused agave, fresh lime and spiced salt. If you want to start your night with a spicy kick and tropical chaser, this one’s for you. Cheddar & Parmesan crackers keep things simple but elegant. Go for a canapé-style plate of comté-miso mousse piped onto the crackers, topped with shaved brie snow. This is paired with a Dirty Gin & Tonic made with blue-cheese-infused gin, olive brine, Mediterranean tonic and olives. If you like a combination of sweet and smoky, try Honey Soy Chicken crackers served with confit duck leg rillettes, hoisin and crème fraîche. This one is on the snackier side and comes with a Brown Butter Derby: brown-butter fat-washed bourbon, grapefruit, honey syrup, Angostura bitters, cinnamon and a grapefruit twist. And if you feel it’s not a proper aperitivo hour without something more Italian, The White Horse has you covered. The kitchen tops the Sea Salt & Balsamic Vinegar flavoured                 "language": "en",
                "description": "The appropriately named elephant bird was the largest bird to ever live. Learn more about this impressive creature with A Moment of Science!",
                "content": "Elephant birds are aptly named. Not only were they the biggest birds to have ever lived, their taxonomy has inspired big debate.\nWould you risk goading this avian with the insult, 'Hey, bird brain?' Not likely. The herbivorous elephant birds lived on Madagascar, once home to megafauna such as giant lemurs and tortoises. The elephant birds fit right in. Based on skeletal remains, scientists calculate that the largest known specimen stood almost ten feet high, and weighed nearly 1,700 pounds. That's taller than, well, Big Bird from Sesame Street, and heavier than the average polar bear. With powerful legs ending in sharp talons, an elephant bird made a fearsome sight.\nAbout a millennium ago, the formidable fowl was wiped out, likely due in part to egg poaching by hungry humans. At thirteen inches long, the elephant bird's egg is the largest egg of any animal ever—larger, even, than a dinosaur egg.\nImpressed? So were researchers in the 1800s. Each hoping to proclaim a new discovery, they hotly debated the number of species, the significance of bone fragments, and how big the elephant bird truly was. The great debate resulted in a jumbled, contradictory taxonomy. What was the true history of the feathered giant? Only recently have scientists sorted elephant birds into three genuses and four species.\nBirds of fantastical size and shape haunt the pages of the Arabian Nights and journals from Marco Polo. Were these stories based on sightings of a real-life elephant bird? We may never know. Yet the remarkable elephant bird still stands tall—no longer on land, it now towers in our imagination.\nReviewer: Matthew Phillips, Queensland University of Technology\nRead more\nSources\nElephant birds are aptly named. Not only were they the biggest birds to have ever lived, their taxonomy has inspired big debate.\nWould you risk goading this avian with the insult, 'Hey, bird brain?' Not likely. The herbivorous elephant birds lived on Madagascar, once h /**
 * Provider table — single source of truth for the dashboard.
 * `feeds.live` and `feeds.conflict` are the relative endpoint paths
 * for each provider's two iOS-facing list endpoints.
 */
const PROVIDERS = [
  {
    id: 'legacy',
    label: 'Legacy (RSS + GDELT)',
    feeds: {
      live:     '/api/live-news/v2/list-us-headlines',
      conflict: '/api/conflict-archive/v1/list',
    },
    // Legacy has no upstream API — it's a scraped RSS pipeline. The
    // "Raw Samples" tab hides this column since there's no upstream
    // wire shape to compare against.
    sample: null,
  },
  {
    id: 'worldnews',
    label: 'World News API',
    feeds: {
      live:     '/api/live-news/v3/list-us-headlines',
      conflict: '/api/conflict-archive/v2/list',
    },
    /** Upstream URL the snapshot came from — shown as the endpoint label. */
    sampleEndpoint: 'GET https://api.worldnewsapi.com/search-news?lang=en&source-countries=us,gb,au,ca&number=3',
    sample: () => SAMPLES.worldnews,
  },
  {
    id: 'webz',
    label: 'Webz.io',
    feeds: {
      live:     '/api/live-news/v4/list-us-headlines',
      conflict: '/api/conflict-archive/v3/list',
    },
    sampleEndpoint: 'GET https://api.webz.io/newsApiLite?q=language:english thread.country:(US OR GB OR AU OR CA)&size=3',
    sample: () => SAMPLES.webz,
  },
  {
    id: 'newscatcher',
    label: 'Newscatcher',
    feeds: {
      live:     '/api/live-news/v5/list-us-headlines',
      conflict: '/api/conflict-archive/v4/list',
    },
    sampleEndpoint: 'POST https://v3-api.newscatcherapi.com/api/latest_headlines  (when=3h, +NLP, +clustering)',
    sample: () => SAMPLES.newscatcher,
  },
];

/** Providers visible in the current tab. Raw Samples mode hides legacy. */
function activeProviders() {
  if (currentFeed === 'samples') return PROVIDERS.filter((p) => typeof p.sample === 'function');
  return PROVIDERS;
}

const ITEMS_PER_PROVIDER = 5;
const KEY_STORAGE = 'wm.dashboard.apiKey';

/**
 * Optional backend override via `?base=https://...`. Lets you open the
 * dashboard from anywhere (file://, vite dev, a different host) and
 * still point fetches at the deployed API. With no override, paths are
 * relative — works when the dashboard is served from the same origin
 * as the API.
 */
const API_BASE = (new URLSearchParams(window.location.search).get('base') || '').replace(/\/+$/, '');

const grid       = document.getElementById('grid');
const tabs       = document.getElementById('tabs');
const refreshBtn = document.getElementById('refreshBtn');
const keyInput   = document.getElementById('apiKeyInput');

let currentFeed = 'live';

// Restore saved API key (if any) — handy across reloads.
keyInput.value = localStorage.getItem(KEY_STORAGE) || '';
keyInput.addEventListener('change', () => {
  const v = keyInput.value.trim();
  if (v) localStorage.setItem(KEY_STORAGE, v);
  else localStorage.removeItem(KEY_STORAGE);
});

tabs.addEventListener('click', (e) => {
  const t = e.target.closest('.tab');
  if (!t) return;
  document.querySelectorAll('.tab').forEach((b) => b.classList.toggle('active', b === t));
  currentFeed = t.dataset.feed;
  // Refresh + API key are only meaningful for the live tabs. Hide them
  // when the user is browsing static snapshots.
  const isSamples = currentFeed === 'samples';
  keyInput.style.display   = isSamples ? 'none' : '';
  refreshBtn.style.display = isSamples ? 'none' : '';
  loadAll();
});

refreshBtn.addEventListener('click', loadAll);

/**
 * Render a JSON value as a collapsible tree. Every object / array becomes
 * a native <details> element so the user can open/close any sub-tree.
 * Top-level call: `renderJSONTree(item)`. Recursive calls pass the key
 * (or array index) so the rendered row shows `"name": value`.
 *
 * No external lib — we lean on <details> for collapse state instead of
 * tracking it in JS. That means the page can have hundreds of collapsible
 * blocks open simultaneously with no perf cost, and ⌘-F search-in-page
 * still finds collapsed content thanks to the browser's lookup behavior
 * (Safari/Chrome auto-expand details that contain a match).
 */
function renderJSONTree(value, key, _depth) {
  const keyPart = key != null
    ? `<span class="json-key">"${escapeHtml(String(key))}"</span><span class="json-punct">:</span> `
    : '';

  if (value === null)                  return renderLeaf(keyPart, 'null', 'json-null');
  if (typeof value === 'string')       return renderLeaf(keyPart, JSON.stringify(value), 'json-string');
  if (typeof value === 'number')       return renderLeaf(keyPart, String(value), 'json-number');
  if (typeof value === 'boolean')      return renderLeaf(keyPart, String(value), 'json-bool');

  const isArray = Array.isArray(value);
  const entries = isArray
    ? value.map((v, i) => ({ k: String(i), v }))
    : Object.keys(value).map((k) => ({ k, v: value[k] }));

  if (entries.length === 0) {
    const empty = isArray ? '[]' : '{}';
    return `<div class="json-line">${keyPart}<span class="json-punct">${empty}</span></div>`;
  }

  const open  = isArray ? '[' : '{';
  const close = isArray ? ']' : '}';
  const meta  = isArray
    ? `${entries.length} ${entries.length === 1 ? 'item' : 'items'}`
    : `${entries.length} ${entries.length === 1 ? 'key' : 'keys'}`;

  const children = entries.map((e) => renderJSONTree(e.v, e.k, (_depth || 0) + 1)).join('');

  return `<details class="json-block" open>` +
           `<summary class="json-summary">${keyPart}` +
             `<span class="json-punct">${open}</span>` +
             `<span class="json-meta">${meta}</span>` +
             `<span class="json-punct">${close}</span>` +
           `</summary>` +
           `<div class="json-children">${children}</div>` +
         `</details>`;
}

function renderLeaf(keyPart, displayText, cls) {
  return `<div class="json-line">${keyPart}<span class="${cls}">${escapeHtml(displayText)}</span></div>`;
}

/**
 * Pull a sensible items list out of any provider's response shape.
 *
 *   • iOS-wire shape (our normalised endpoints):  `body.items`
 *   • WorldNews API raw:                           `body.news`
 *   • Webz.io raw:                                 `body.posts`
 *   • Newscatcher raw (clustered):                 `body.clusters`
 */
function pickItems(body) {
  if (Array.isArray(body)) return body;
  if (body && Array.isArray(body.items)) return body.items;
  if (body && Array.isArray(body.posts)) return body.posts;
  if (body && Array.isArray(body.news)) return body.news;
  if (body && Array.isArray(body.clusters)) return body.clusters;
  return [];
}

/**
 * Top-level metadata (everything OTHER than the items array). Used to
 * surface the response envelope in the "Raw Samples" tab so users can
 * see e.g. `requestsLeft`, `total_hits`, `available`, etc.
 */
function pickEnvelope(body) {
  if (!body || typeof body !== 'object' || Array.isArray(body)) return null;
  const envelope = {};
  for (const k of Object.keys(body)) {
    if (k === 'items' || k === 'posts' || k === 'news' || k === 'clusters') continue;
    envelope[k] = body[k];
  }
  return Object.keys(envelope).length > 0 ? envelope : null;
}

/**
 * Newscatcher returns clusters with the canonical article at
 * `cluster.articles[0]`. For the row-summary pickers below we transparently
 * follow that one level of indirection so the column header still shows
 * the real article info instead of "{cluster_id: ...}".
 */
function unwrap(item) {
  if (item && Array.isArray(item.articles) && item.articles.length > 0) {
    return item.articles[0];
  }
  return item;
}

function pickCountry(item) {
  const a = unwrap(item);
  return (
    a.country ||
    a.source_country ||
    (a.thread && a.thread.country) ||
    ''
  ).toString().toLowerCase();
}

function pickTitle(item) {
  const a = unwrap(item);
  return a.title || (a.thread && a.thread.title) || '(no title)';
}

function pickSource(item) {
  const a = unwrap(item);
  return (
    a.source ||
    a.name_source ||
    a.domain_url ||
    (a.thread && (a.thread.site || a.thread.site_full)) ||
    ''
  );
}

function pickPublishedAt(item) {
  const a = unwrap(item);
  if (typeof a.publishedAt === 'number') {
    const ms = a.publishedAt > 10_000_000_000 ? a.publishedAt : a.publishedAt * 1000;
    return new Date(ms).toISOString().slice(0, 19).replace('T', ' ');
  }
  return a.published_date || a.published || '';
}

/** Build the static skeleton — column per provider, will be filled by fetchAndRender(). */
function renderSkeleton() {
  const providers = activeProviders();
  grid.innerHTML = providers.map((p) => {
    // Pick the right "endpoint" string per tab. In samples mode we show
    // the upstream API URL the snapshot was captured from.
    const endpoint = currentFeed === 'samples'
      ? (p.sampleEndpoint || '(no upstream)')
      : `${API_BASE || ''}${p.feeds[currentFeed]}`;
    const loadingText = currentFeed === 'samples' ? 'Rendering snapshot' : 'Loading';
    return `
      <section class="col" data-provider="${p.id}">
        <div class="col-head">
          <div class="col-title">${p.label}</div>
          <div class="col-endpoint">${endpoint}</div>
          <div class="col-stats" data-stats>
            <span class="stat"><strong>—</strong></span>
          </div>
        </div>
        <div class="items" data-items>
          <div class="loading">${loadingText}</div>
        </div>
      </section>
    `;
  }).join('');
}

function renderColumn(provider, payload) {
  const col = grid.querySelector(`[data-provider="${provider.id}"]`);
  if (!col) return;
  const stats = col.querySelector('[data-stats]');
  const body  = col.querySelector('[data-items]');

  if (payload.error) {
    stats.innerHTML = `<span class="stat error"><strong>FAIL</strong></span><span class="stat"><strong>${payload.elapsedMs}</strong> ms</span>`;
    body.innerHTML = `<div class="error-row">${payload.error}</div>`;
    return;
  }

  const items = pickItems(payload.body).slice(0, ITEMS_PER_PROVIDER);
  if (currentFeed === 'samples') {
    stats.innerHTML = `
      <span class="stat ok"><strong>SNAPSHOT</strong></span>
      <span class="stat"><strong>${pickItems(payload.body).length}</strong> items in sample</span>
    `;
  } else {
    stats.innerHTML = `
      <span class="stat ok"><strong>${payload.status}</strong></span>
      <span class="stat"><strong>${payload.elapsedMs}</strong> ms</span>
      <span class="stat"><strong>${pickItems(payload.body).length}</strong> items total</span>
    `;
  }

  // In the Raw Samples tab, prepend a card for the response envelope —
  // top-level fields like `totalResults`, `requestsLeft`, `available`,
  // `clusters_count`. Useful for showing each provider's wire shape.
  const envelopeHtml = (() => {
    if (currentFeed !== 'samples') return '';
    const env = pickEnvelope(payload.body);
    if (!env) return '';
    return `
      <details class="item envelope">
        <summary>
          <div class="item-title">↳ Response envelope</div>
          <div class="item-meta">
            <span>${Object.keys(env).length} top-level keys</span>
          </div>
        </summary>
        <div class="item-body">
          <div class="json-tree">${renderJSONTree(env)}</div>
        </div>
      </details>
    `;
  })();

  if (items.length === 0) {
    body.innerHTML = envelopeHtml || '<div class="empty">No items.</div>';
    return;
  }

  body.innerHTML = envelopeHtml + items.map((item, idx) => {
    const title = pickTitle(item);
    const country = pickCountry(item);
    const src = pickSource(item);
    const when = pickPublishedAt(item);
    return `
      <details class="item">
        <summary>
          <div class="item-title">${escapeHtml(title)}</div>
          <div class="item-meta">
            <span>#${idx + 1}</span>
            ${country ? `<span class="country">${escapeHtml(country)}</span>` : ''}
            ${src ? `<span>${escapeHtml(src)}</span>` : ''}
            ${when ? `<span>${escapeHtml(when)}</span>` : ''}
          </div>
        </summary>
        <div class="item-body">
          <div class="json-tree">${renderJSONTree(item)}</div>
          <div class="json-toolbar">
            <button class="copy-btn" data-copy-idx="${idx}">Copy JSON</button>
          </div>
        </div>
      </details>
    `;
  }).join('');

  // Wire up the Copy buttons after the HTML is in the DOM.
  body.querySelectorAll('button.copy-btn').forEach((btn) => {
    btn.addEventListener('click', async (e) => {
      e.preventDefault();
      const idx = Number(btn.dataset.copyIdx);
      const item = items[idx];
      if (!item) return;
      try {
        await navigator.clipboard.writeText(JSON.stringify(item, null, 2));
        const orig = btn.textContent;
        btn.textContent = 'Copied ✓';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = orig;
          btn.classList.remove('copied');
        }, 1200);
      } catch {
        btn.textContent = 'Copy failed';
      }
    });
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"]/g, (c) => (
    { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]
  ));
}

/**
 * Resolve one column's payload. Live / Conflict tabs fetch over HTTP;
 * Raw Samples tab pulls from the in-page SAMPLES constant — no network.
 * Both shapes return `{ status, body, elapsedMs }` for renderColumn.
 */
async function fetchProvider(provider) {
  if (currentFeed === 'samples') {
    if (typeof provider.sample !== 'function') {
      return { error: 'No sample available for this provider', elapsedMs: 0 };
    }
    return { status: 200, body: provider.sample(), elapsedMs: 0, sourceLabel: 'snapshot' };
  }

  const url = API_BASE + provider.feeds[currentFeed];
  const t0 = performance.now();
  try {
    const headers = { 'Accept': 'application/json' };
    const key = keyInput.value.trim();
    if (key) headers['X-WorldMonitor-Key'] = key;
    const resp = await fetch(url, { headers, cache: 'no-store' });
    const elapsedMs = Math.round(performance.now() - t0);
    let body = null;
    try { body = await resp.json(); } catch { body = null; }
    if (!resp.ok) {
      return { error: `HTTP ${resp.status} ${resp.statusText} — ${JSON.stringify(body || {})}`, elapsedMs };
    }
    return { status: resp.status, body, elapsedMs };
  } catch (err) {
    const elapsedMs = Math.round(performance.now() - t0);
    return { error: String(err && err.message || err), elapsedMs };
  }
}

async function loadAll() {
  renderSkeleton();
  // Fire all visible providers in parallel; render each as it lands.
  // (Raw Samples mode returns synchronously from `fetchProvider`, but
  // the same code path is fine — it just resolves immediately.)
  await Promise.all(activeProviders().map(async (p) => {
    const payload = await fetchProvider(p);
    renderColumn(p, payload);
  }));
}

loadAll();
</script>
